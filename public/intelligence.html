  [804,1609,3218].forEach((r,i)=>{

    const icon=L.divIcon({className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],

function tl(l){
  document.querySelectorAll('#ly-a,#ly-h').forEach(b=>b.classList.remove('on'));
  document.getElementById('ly-'+(l==='a'?'a':'h')).classList.add('on');
  hc.forEach(c=>map.removeLayer(c));hc=[];
  if(l==='h'){
    [{la:33.977,lo:-118.155,r:500,i:0.95},{la:33.984,lo:-118.190,r:600,i:0.75},{la:33.987,lo:-118.172,r:400,i:0.85},{la:34.001,lo:-118.160,r:450,i:0.80},{la:33.955,lo:-118.180,r:700,i:0.55}].forEach(z=>{
      const h=120-z.i*120;
      hc.push(L.circle([z.la,z.lo],{radius:z.r,color:`hsl(${h},100%,50%)`,weight:0,fillColor:`hsl(${h},100%,50%)`,fillOpacity:z.i*0.15}).addTo(map));
    });
  }
}

  h+=`<div class="cd"><div class="m" style="font-size:8px;color:#5c5c78;letter-spacing:3px;margin-bottom:8px">WHY IT'S MOVING</div>`;
  VN.forEach(n=>{h+=`<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><div style="width:20px;text-align:center;font-size:16px;color:${n.c}">${n.d}</div><div style="flex:1"><div style="font-size:12px;color:#e2e2ef;line-height:1.3">${n.x}</div><div class="m" style="font-size:9px;color:#5c5c78;margin-top:2px">${n.t} ago · <span style="color:${n.c}">${n.i} IMPACT</span></div></div></div>`;});
  h+=`</div><div class="cd"><div class="m" style="font-size:8px;color:#5c5c78;letter-spacing:3px;margin-bottom:8px">SCALP OPPORTUNITIES</div>`;
  VT.forEach((t,i)=>{const a=i===ai;h+=`<div style="padding:8px 10px;margin-bottom:4px;border-radius:6px;background:${a?'rgba(255,184,0,0.06)':'#06060b'};border:1px solid ${a?'#ffb800':'rgba(255,255,255,0.04)'};opacity:${a?1:0.35}"><div style="display:flex;justify-content:space-between"><div><span class="m" style="font-size:9px;color:${a?'#ffb800':'#5c5c78'};font-weight:600">${t.r}</span><span style="font-size:13px;color:${a?'#eeeef4':'#5c5c78'};margin-left:8px;font-weight:500">${t.s}</span></div><span class="m" style="font-size:8px;color:${a?'#00e87b':'#2e2e44'};padding:2px 8px;border-radius:3px;background:${a?'rgba(0,232,123,0.1)':'transparent'}">${a?'READY':'WAIT'}</span></div>${a?`<div style="margin-top:6px"><div class="m" style="font-size:10px;color:#e2e2ef">${t.k} · ${t.d}</div><div style="font-size:10px;color:#5c5c78;margin-top:2px">${t.e}</div></div>`:''}</div>`;});
  h+=`</div>`;
  document.getElementById('vx').innerHTML=h;
}

function sw(t){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>{b.classList.remove('a','ap','ar')});
  document.getElementById('p-'+t).classList.add('active');
  const cls=t==='l'?'a':t==='b'?'ap':'ar';
  document.getElementById('t-'+t).classList.add(cls);
  if(t==='b')rBB();if(t==='v')rVix();
  if(t==='l')setTimeout(()=>map&&map.invalidateSize(),100);
}

function slv(v){
  document.getElementById('sl-m').classList.toggle('on',v==='m');
  document.getElementById('sl-p').classList.toggle('on',v==='p');
  document.getElementById('mv-m').style.display=v==='m'?'flex':'none';
  document.getElementById('mv-p').style.display=v==='p'?'flex':'none';
  if(v==='m')setTimeout(()=>map&&map.invalidateSize(),100);
}

setInterval(()=>{document.getElementById('ck').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})},1000);
setInterval(()=>{vix=Math.max(12,Math.min(35,vix+(Math.random()-0.48)*0.3));const vc=vix>25?'#ff2d55':vix>20?'#ffb800':'#00e87b';document.getElementById('vh').textContent=vix.toFixed(2);document.getElementById('vh').style.color=vc;},3000);

window.addEventListener('load',()=>{initMap();rBB();rVix();document.getElementById('ck').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});});
</script>
